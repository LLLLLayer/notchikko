<svg xmlns="http://www.w3.org/2000/svg" viewBox="-8 -2 32 18" width="500" height="500" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      /* Body sways like a pendulum held from above */
      .body-sway {
        transform-origin: 7.5px 2px;
        animation: sway 1.2s infinite alternate ease-in-out;
      }

      /* Leg dangling - alternating pairs */
      .leg-dangle-1 {
        animation: dangle-1 0.5s infinite linear;
        transform-origin: top center;
        transform-box: fill-box;
      }
      .leg-dangle-2 {
        animation: dangle-2 0.5s infinite linear;
        transform-origin: top center;
        transform-box: fill-box;
      }

      /* Arm flailing rapidly */
      .arm-flail-l {
        transform-box: fill-box;
        transform-origin: 100% 0%;
        animation: flail-l 0.2s infinite alternate ease-in-out;
      }
      .arm-flail-r {
        transform-box: fill-box;
        transform-origin: 0% 0%;
        animation: flail-r 0.2s infinite alternate ease-in-out;
      }

      /* Shadow pulses small and faint */
      .shadow-lift {
        transform-origin: 7.5px 14.5px;
        animation: shadow-pulse 1.2s infinite alternate ease-in-out;
      }

      @keyframes sway {
        0%   { transform: rotate(-3deg) translate(-0.5px, 0); }
        100% { transform: rotate(3deg) translate(0.5px, 0); }
      }

      @keyframes dangle-1 {
        0%, 100% { transform: rotate(0deg) scaleY(1); }
        50%      { transform: rotate(-25deg) scaleY(0.7); }
      }
      @keyframes dangle-2 {
        0%, 100% { transform: rotate(-25deg) scaleY(0.7); }
        50%      { transform: rotate(0deg) scaleY(1); }
      }

      @keyframes flail-l {
        0%   { transform: rotate(45deg); }
        100% { transform: rotate(85deg); }
      }
      @keyframes flail-r {
        0%   { transform: rotate(-45deg); }
        100% { transform: rotate(-85deg); }
      }

      @keyframes shadow-pulse {
        0%   { transform: scaleX(0.7); opacity: 0.1; }
        100% { transform: scaleX(0.8); opacity: 0.2; }
      }
    </style>
  </defs>

  <!-- Ground Shadow (small + faint = lifted off ground) -->
  <rect class="shadow-lift" x="4" y="14" width="7" height="1" fill="#000" opacity="0.15"/>

  <!-- Swaying body group -->
  <g class="body-sway">
    <!-- Dangling legs -->
    <g fill="#DE886D">
      <rect class="leg-dangle-1" x="3" y="9" width="1" height="3"/>
      <rect class="leg-dangle-2" x="5" y="9" width="1" height="3"/>
      <rect class="leg-dangle-1" x="9" y="9" width="1" height="3"/>
      <rect class="leg-dangle-2" x="11" y="9" width="1" height="3"/>
    </g>

    <!-- Head stripe -->
    <rect x="2" y="2" width="11" height="1" fill="#C07050"/>
    <!-- Body -->
    <rect x="2" y="3" width="11" height="6" fill="#DE886D"/>

    <!-- Flailing arms -->
    <g class="arm-flail-l">
      <rect x="0" y="5" width="2" height="2" fill="#DE886D"/>
    </g>
    <g class="arm-flail-r">
      <rect x="13" y="5" width="2" height="2" fill="#DE886D"/>
    </g>

    <!-- >< Eyes (anime squint) -->
    <g fill="none" stroke="#000" stroke-width="0.7" stroke-linecap="round">
      <!-- Left eye: > shape -->
      <polyline points="4,4.5 5.5,5.5 4,6.5"/>
      <!-- Right eye: < shape -->
      <polyline points="11,4.5 9.5,5.5 11,6.5"/>
    </g>
  </g>
</svg>
