<svg xmlns="http://www.w3.org/2000/svg" viewBox="-8 -2 32 18" width="500" height="500" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      /* Gentle body sway */
      .body-sway {
        transform-origin: 7.5px 2px;
        animation: sway 1.5s infinite alternate ease-in-out;
      }

      /* Gentle leg dangle */
      .leg-dangle-1 {
        animation: dangle-1 0.8s infinite linear;
        transform-origin: top center;
        transform-box: fill-box;
      }
      .leg-dangle-2 {
        animation: dangle-2 0.8s infinite linear;
        transform-origin: top center;
        transform-box: fill-box;
      }

      /* Happy arm wave */
      .arm-wave-l {
        transform-box: fill-box;
        transform-origin: 100% 0%;
        animation: wave-l 0.3s infinite alternate ease-in-out;
      }
      .arm-wave-r {
        transform-box: fill-box;
        transform-origin: 0% 0%;
        animation: wave-r 0.3s infinite alternate ease-in-out;
      }

      /* Happy squint eyes with reverse blink */
      .happy-eye {
        transform-box: fill-box;
        transform-origin: center;
        animation: happy-blink 3s infinite ease-in-out;
      }

      /* Shadow */
      .shadow-lift {
        transform-origin: 7.5px 14.5px;
        animation: shadow-pulse 1.5s infinite alternate ease-in-out;
      }

      /* Floating hearts */
      .heart-1 {
        animation: float-heart-1 2s infinite ease-in-out;
      }
      .heart-2 {
        animation: float-heart-2 2s 0.6s infinite ease-in-out;
      }
      .heart-3 {
        animation: float-heart-3 2s 1.2s infinite ease-in-out;
      }

      @keyframes sway {
        0%   { transform: rotate(-2deg) translate(-0.3px, 0); }
        100% { transform: rotate(2deg) translate(0.3px, 0); }
      }

      @keyframes dangle-1 {
        0%, 100% { transform: rotate(0deg) scaleY(1); }
        50%      { transform: rotate(-15deg) scaleY(0.85); }
      }
      @keyframes dangle-2 {
        0%, 100% { transform: rotate(-15deg) scaleY(0.85); }
        50%      { transform: rotate(0deg) scaleY(1); }
      }

      @keyframes wave-l {
        0%   { transform: rotate(30deg); }
        100% { transform: rotate(60deg); }
      }
      @keyframes wave-r {
        0%   { transform: rotate(-30deg); }
        100% { transform: rotate(-60deg); }
      }

      @keyframes happy-blink {
        0%, 80%, 100% { transform: scaleY(0.3); }
        85%, 95%      { transform: scaleY(1); }
        90%           { transform: scaleY(1); }
      }

      @keyframes shadow-pulse {
        0%   { transform: scaleX(0.7); opacity: 0.1; }
        100% { transform: scaleX(0.8); opacity: 0.2; }
      }

      @keyframes float-heart-1 {
        0%   { transform: translate(0, 0); opacity: 1; }
        50%  { transform: translate(-1px, -3px); opacity: 0.8; }
        100% { transform: translate(0.5px, -6px); opacity: 0; }
      }
      @keyframes float-heart-2 {
        0%   { transform: translate(0, 0); opacity: 1; }
        50%  { transform: translate(1px, -3px); opacity: 0.8; }
        100% { transform: translate(-0.5px, -6px); opacity: 0; }
      }
      @keyframes float-heart-3 {
        0%   { transform: translate(0, 0); opacity: 1; }
        50%  { transform: translate(0px, -2.5px); opacity: 0.8; }
        100% { transform: translate(1px, -5.5px); opacity: 0; }
      }
    </style>
  </defs>

  <!-- Ground Shadow -->
  <rect class="shadow-lift" x="4" y="14" width="7" height="1" fill="#000" opacity="0.15"/>

  <!-- Floating hearts -->
  <rect class="heart-1" x="1" y="2" width="1" height="1" fill="#FF5252"/>
  <rect class="heart-2" x="14" y="1" width="1" height="1" fill="#FF5252"/>
  <rect class="heart-3" x="8" y="0" width="1" height="1" fill="#FF5252"/>

  <!-- Swaying body group -->
  <g class="body-sway">
    <!-- Dangling legs -->
    <g fill="#DE886D">
      <rect class="leg-dangle-1" x="3" y="9" width="1" height="3"/>
      <rect class="leg-dangle-2" x="5" y="9" width="1" height="3"/>
      <rect class="leg-dangle-1" x="9" y="9" width="1" height="3"/>
      <rect class="leg-dangle-2" x="11" y="9" width="1" height="3"/>
    </g>

    <!-- Head stripe -->
    <rect x="2" y="2" width="11" height="1" fill="#C07050"/>
    <!-- Body -->
    <rect x="2" y="3" width="11" height="6" fill="#DE886D"/>

    <!-- Waving arms -->
    <g class="arm-wave-l">
      <rect x="0" y="5" width="2" height="2" fill="#DE886D"/>
    </g>
    <g class="arm-wave-r">
      <rect x="13" y="5" width="2" height="2" fill="#DE886D"/>
    </g>

    <!-- Happy squint eyes (1x1, scaleY 0.3 with reverse blink) -->
    <rect class="happy-eye" x="5" y="5" width="1" height="1" fill="#000"/>
    <rect class="happy-eye" x="10" y="5" width="1" height="1" fill="#000"/>
  </g>
</svg>
