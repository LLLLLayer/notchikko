<svg xmlns="http://www.w3.org/2000/svg" viewBox="-8 -16 32 18" preserveAspectRatio="xMidYMin meet" width="500" height="500">
  <defs>
    <style>
      .breathe-anim {
        transform-origin: 7.5px -7px;
        animation: breathe-fast 2s infinite ease-in-out;
      }

      .eyes-blink {
        transform-box: fill-box;
        transform-origin: center;
        animation: eye-blink-fast 2.5s infinite ease-in-out;
      }

      .tremble {
        animation: shake 0.15s infinite linear;
      }

      .eyes-dart {
        animation: dart 0.8s infinite ease-in-out;
      }

      .knee-left {
        animation: knock-l 0.3s infinite ease-in-out;
      }

      .knee-right {
        animation: knock-r 0.3s infinite ease-in-out;
      }

      .sweat-1 { animation: sweat-fly-1 1.5s infinite ease-out 0s; }
      .sweat-2 { animation: sweat-fly-2 1.5s infinite ease-out 0.5s; }
      .sweat-3 { animation: sweat-fly-3 1.5s infinite ease-out 1s; }

      .exclaim-1 { animation: flash 1.2s infinite ease-in-out 0s; }
      .exclaim-2 { animation: flash 1.2s infinite ease-in-out 0.6s; }

      @keyframes breathe-fast {
        0%, 100% { transform: scale(1, 1) translate(0, 0); }
        50% { transform: scale(1.02, 0.98) translate(0, -0.5px); }
      }

      @keyframes eye-blink-fast {
        0%, 10%, 100% { transform: scaleY(1); }
        5% { transform: scaleY(0.1); }
      }

      @keyframes shake {
        0% { transform: translateX(-0.5px); }
        50% { transform: translateX(0.5px); }
        100% { transform: translateX(-0.5px); }
      }

      @keyframes dart {
        0%, 100% { transform: translateX(-0.5px); }
        50% { transform: translateX(0.5px); }
      }

      @keyframes knock-l {
        0%, 100% { transform: translateX(0); }
        50% { transform: translateX(0.3px); }
      }

      @keyframes knock-r {
        0%, 100% { transform: translateX(0); }
        50% { transform: translateX(-0.3px); }
      }

      @keyframes sweat-fly-1 {
        0% { transform: translate(0, 0); opacity: 1; }
        100% { transform: translate(-3px, -2px); opacity: 0; }
      }

      @keyframes sweat-fly-2 {
        0% { transform: translate(0, 0); opacity: 1; }
        100% { transform: translate(3px, -1px); opacity: 0; }
      }

      @keyframes sweat-fly-3 {
        0% { transform: translate(0, 0); opacity: 1; }
        100% { transform: translate(-2px, -3px); opacity: 0; }
      }

      @keyframes flash {
        0%, 100% { opacity: 0; }
        50% { opacity: 1; }
      }
    </style>
  </defs>

  <g transform="scale(1,-1)">
    <!-- Shadow -->
    <rect x="3" y="15" width="9" height="1" fill="#00000033"/>

    <!-- Legs with knocking knees -->
    <g fill="#DE886D">
      <rect x="3" y="12" width="1" height="3"/>
      <rect class="knee-left" x="5" y="12" width="1" height="3"/>
      <rect class="knee-right" x="9" y="12" width="1" height="3"/>
      <rect x="11" y="12" width="1" height="3"/>
    </g>

    <!-- Body with tremble -->
    <g class="tremble">
      <g class="breathe-anim">
        <!-- Head stripe -->
        <rect x="2" y="5" width="11" height="1" fill="#C07050"/>
        <!-- Body -->
        <rect x="2" y="6" width="11" height="6" fill="#DE886D"/>
        <!-- Left Arm -->
        <rect x="0" y="9" width="2" height="2" fill="#DE886D"/>
        <!-- Right Arm -->
        <rect x="13" y="9" width="2" height="2" fill="#DE886D"/>
        <!-- Eyes (wide, darting) -->
        <g fill="#000" class="eyes-dart">
          <g class="eyes-blink">
            <rect x="5" y="8" width="1" height="1"/>
            <rect x="10" y="8" width="1" height="1"/>
          </g>
        </g>
      </g>
    </g>

    <!-- Sweat drops -->
    <g fill="#40C4FF">
      <rect class="sweat-1" x="1" y="5" width="0.8" height="1" rx="0.2"/>
      <rect class="sweat-2" x="14" y="5" width="0.8" height="1" rx="0.2"/>
      <rect class="sweat-3" x="7" y="3" width="0.8" height="1" rx="0.2"/>
    </g>

    <!-- Exclamation marks -->
    <g fill="#FF5252">
      <g class="exclaim-1">
        <rect x="0" y="2" width="0.8" height="2"/>
        <rect x="0" y="4.5" width="0.8" height="0.8"/>
      </g>
      <g class="exclaim-2">
        <rect x="14" y="3" width="0.8" height="2"/>
        <rect x="14" y="5.5" width="0.8" height="0.8"/>
      </g>
    </g>
  </g>
</svg>
