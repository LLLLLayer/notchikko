<svg xmlns="http://www.w3.org/2000/svg" viewBox="-8 -16 32 18" preserveAspectRatio="xMidYMin meet" width="500" height="500">
  <defs>
    <style>
      .breathe {
        transform-origin: 7.5px 10px;
        animation: breathe 5s infinite ease-in-out;
      }
      .body-slump {
        transform-origin: 7.5px 12px;
        animation: body-slump 5s infinite ease-in-out;
      }
      .sip-arm {
        transform-origin: 14px 10px;
        animation: sip-arm 10s infinite ease-in-out;
      }
      .steam1 {
        opacity: 0;
        animation: steam-rise 4s infinite ease-out;
      }
      .steam2 {
        opacity: 0;
        animation: steam-rise 4s 1.3s infinite ease-out;
      }
      .steam3 {
        opacity: 0;
        animation: steam-rise 4s 2.6s infinite ease-out;
      }
      .shadow-anim {
        transform-origin: 7.5px 15.5px;
        animation: shadow-pulse 5s infinite ease-in-out;
      }

      /* Zzz particles */
      .z-particle { opacity: 0; }
      .z1 { animation: float-z1 6s infinite ease-in-out; animation-delay: 0s; }
      .z2 { animation: float-z2 6s infinite ease-in-out; animation-delay: 2s; }
      .z3 { animation: float-z3 6s infinite ease-in-out; animation-delay: 4s; }

      @keyframes breathe {
        0%, 100% { transform: scale(1, 1); }
        50% { transform: scale(1.01, 0.99); }
      }
      @keyframes body-slump {
        0%, 100% { transform: scaleY(0.95) translateY(0.5px); }
        50% { transform: scaleY(0.93) translateY(0.8px); }
      }
      @keyframes sip-arm {
        0%, 85%, 100% { transform: rotate(0deg) translate(0, 0); }
        90% { transform: rotate(-15deg) translate(-0.5px, -1px); }
        95% { transform: rotate(-15deg) translate(-0.5px, -1px); }
        98% { transform: rotate(0deg) translate(0, 0); }
      }
      @keyframes steam-rise {
        0% { opacity: 0.4; transform: translate(0, 0); }
        100% { opacity: 0; transform: translate(0, -6px); }
      }
      @keyframes shadow-pulse {
        0%, 100% { transform: scaleX(1); opacity: 0.5; }
        50% { transform: scaleX(0.98); opacity: 0.48; }
      }

      @keyframes float-z1 {
        0%   { transform: translate(5px, 8px) scale(0.4); opacity: 0; }
        10%  { opacity: 0.8; }
        50%  { transform: translate(8px, 2px) scale(0.7); opacity: 0.6; }
        100% { transform: translate(6px, -4px) scale(0.9); opacity: 0; }
      }
      @keyframes float-z2 {
        0%   { transform: translate(7px, 9px) scale(0.3); opacity: 0; }
        10%  { opacity: 0.7; }
        50%  { transform: translate(5px, 3px) scale(0.5); opacity: 0.5; }
        100% { transform: translate(8px, -3px) scale(0.8); opacity: 0; }
      }
      @keyframes float-z3 {
        0%   { transform: translate(6px, 7px) scale(0.5); opacity: 0; }
        10%  { opacity: 0.8; }
        50%  { transform: translate(9px, 1px) scale(0.7); opacity: 0.6; }
        100% { transform: translate(5px, -5px) scale(1.0); opacity: 0; }
      }
    </style>

    <!-- Pixel Art "Z" Definitions -->
    <g id="pixel-z">
      <rect x="0" y="0" width="4" height="1"/>
      <rect x="2" y="1" width="1" height="1"/>
      <rect x="1" y="2" width="1" height="1"/>
      <rect x="0" y="3" width="4" height="1"/>
    </g>
    <g id="pixel-z-small">
      <rect x="0" y="0" width="3" height="1"/>
      <rect x="1" y="1" width="1" height="1"/>
      <rect x="0" y="2" width="3" height="1"/>
    </g>
  </defs>
  <g transform="scale(1,-1)">

  <!-- Shadow -->
  <rect class="shadow-anim" x="3" y="15" width="9" height="1" fill="#000"/>

  <!-- Floating Zzz particles -->
  <g class="zzz-particles">
    <use href="#pixel-z" class="z-particle z1" fill="#90A4AE"/>
    <use href="#pixel-z-small" class="z-particle z2" fill="#B0BEC5"/>
    <use href="#pixel-z" class="z-particle z3" fill="#CFD8DC"/>
  </g>

  <!-- Legs -->
  <g fill="#DE886D">
    <rect x="3" y="12" width="1" height="3"/>
    <rect x="5" y="12" width="1" height="3"/>
    <rect x="9" y="12" width="1" height="3"/>
    <rect x="11" y="12" width="1" height="3"/>
  </g>

  <!-- Body group: slump > breathe -->
  <g class="body-slump">
    <g class="breathe">

      <!-- Head stripe -->
      <rect x="2" y="5" width="11" height="1" fill="#C07050"/>
      <!-- Body -->
      <rect x="2" y="6" width="11" height="6" fill="#DE886D"/>

      <!-- Nearly closed sleepy eyes (thin dashes, barely open) -->
      <g fill="#000">
        <rect x="4" y="8" width="2" height="0.2"/>
        <rect x="9" y="8" width="2" height="0.2"/>
      </g>

      <!-- Left arm -->
      <rect x="0" y="9" width="2" height="2" fill="#DE886D"/>

      <!-- Right arm + coffee mug (sluggish sip) -->
      <g class="sip-arm">
        <rect x="13" y="9" width="2" height="2" fill="#DE886D"/>

        <!-- Coffee mug body -->
        <rect x="14" y="9" width="3" height="3" fill="#795548"/>
        <!-- Rim -->
        <rect x="14" y="9" width="3" height="1" fill="#5D4037"/>
        <!-- Handle -->
        <rect x="17" y="10" width="1" height="1" fill="#795548"/>
        <!-- Coffee surface -->
        <rect x="15" y="9" width="1" height="0.5" fill="#3E2723"/>

        <!-- Steam rects (much slower) -->
        <g fill="#B0BEC5">
          <rect class="steam1" x="14.5" y="7" width="1.5" height="1.5"/>
          <rect class="steam2" x="15.5" y="6.5" width="1.5" height="1.5"/>
          <rect class="steam3" x="14" y="6" width="1.5" height="1.5"/>
        </g>
      </g>

    </g>
  </g>

  </g>
</svg>
