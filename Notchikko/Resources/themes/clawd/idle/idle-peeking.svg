<svg xmlns="http://www.w3.org/2000/svg" viewBox="-8 -16 32 18" preserveAspectRatio="xMidYMin meet" width="500" height="500">
  <defs>
    <style>
      .peek-group {
        animation: peek 6s ease-in-out infinite;
      }

      .peek-eyes {
        animation: peek-look 6s ease-in-out infinite;
      }

      .peek-blink {
        transform-origin: 7.5px 8.5px;
        animation: peek-eye-blink 6s infinite ease-in-out;
      }

      @keyframes peek {
        0%, 8%    { transform: scale(1,-1) translateY(0px); }
        14%       { transform: scale(1,-1) translateY(4px); }
        22%       { transform: scale(1,-1) translateY(7px); }
        65%       { transform: scale(1,-1) translateY(7px); }
        80%, 100% { transform: scale(1,-1) translateY(0px); }
      }

      @keyframes peek-look {
        0%, 22%  { transform: translateX(0px); }
        28%, 36% { transform: translateX(-1.5px); }
        42%, 50% { transform: translateX(1.5px); }
        56%, 62% { transform: translateX(-0.8px); }
        68%, 70% { transform: translateX(0px); }
        100%     { transform: translateX(0px); }
      }

      @keyframes peek-eye-blink {
        0%, 38%, 42%, 100% { transform: scaleY(1); }
        40%                { transform: scaleY(0.1); }
      }
    </style>
  </defs>

  <!-- Character group with peek animation (includes flip) -->
  <g class="peek-group">
    <!-- Static Legs -->
    <g id="legs" fill="#DE886D">
      <rect x="3" y="12" width="1" height="3"/>
      <rect x="5" y="12" width="1" height="3"/>
      <rect x="9" y="12" width="1" height="3"/>
      <rect x="11" y="12" width="1" height="3"/>
    </g>

    <!-- Upper Body -->
    <g>
      <!-- Head stripe -->
      <rect x="2" y="5" width="11" height="1" fill="#C07050"/>
      <!-- Body -->
      <rect x="2" y="6" width="11" height="6" fill="#DE886D"/>
      <!-- Left Arm -->
      <rect x="0" y="9" width="2" height="2" fill="#DE886D"/>
      <!-- Right Arm -->
      <rect x="13" y="9" width="2" height="2" fill="#DE886D"/>
      <!-- Eyes -->
      <g class="peek-eyes" fill="#000000">
        <g class="peek-blink">
          <rect x="5" y="8" width="1" height="1"/>
          <rect x="10" y="8" width="1" height="1"/>
        </g>
      </g>
    </g>
  </g>
</svg>
