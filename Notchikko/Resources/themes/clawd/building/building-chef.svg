<svg xmlns="http://www.w3.org/2000/svg" viewBox="-8 -16 32 18" preserveAspectRatio="xMidYMin meet" width="500" height="500">
  <defs>
    <style>
      /* ===== Independent sub-animations ===== */
      .breathe {
        transform-origin: 7.5px 11px;
        animation: breathe 3.2s infinite ease-in-out;
      }
      .blink {
        transform-origin: 7.5px 8px;
        animation: blink 4s infinite;
      }

      /* ===== Spatula flip cycle 1s ===== */
      .body-bounce {
        transform-origin: 7.5px 15px;
        animation: body-bounce 1s infinite;
      }
      .body-squash {
        transform-origin: 7.5px 15px;
        animation: body-squash 1s infinite;
      }
      .arm-r-flip {
        transform-origin: 14px 10px;
        animation: spatula-flip 1s infinite;
      }
      .shadow-anim {
        transform-origin: 7.5px 15.5px;
        animation: shadow-bounce 1s infinite;
      }

      /* Steam particles */
      .steam { opacity: 0; }
      .steam-1 { animation: steam1 1.5s infinite; }
      .steam-2 { animation: steam2 1.5s 0.4s infinite; }
      .steam-3 { animation: steam3 1.5s 0.8s infinite; }
      .steam-4 { animation: steam4 1.5s 1.1s infinite; }

      /* Eyes focus right */
      .eyes-focus {
        animation: eyes-focus 5s infinite ease-in-out;
      }

      /* Sweat */
      .sweat {
        opacity: 0;
        animation: sweat-fly 5s infinite;
      }

      /* ==================== Keyframes ==================== */
      @keyframes breathe {
        0%, 100% { transform: scale(1, 1) translate(0, 0); }
        50% { transform: scale(1.02, 0.98) translate(0, 0.5px); }
      }
      @keyframes blink {
        0%, 10%, 100% { transform: scaleY(1); }
        5% { transform: scaleY(0.1); }
      }

      /* Body bounce synced with spatula */
      @keyframes body-bounce {
        0%, 100% { transform: translateY(0); }
        25%      { transform: translateY(-1.5px); }
        50%      { transform: translateY(1px); }
        75%      { transform: translateY(-0.5px); }
      }

      /* Body squash on bounce */
      @keyframes body-squash {
        0%, 100% { transform: scale(1, 1); }
        25%      { transform: scale(0.97, 1.03); }
        50%      { transform: scale(1.05, 0.95); }
      }

      /* Spatula: flip -30deg to 60deg */
      @keyframes spatula-flip {
        0%       { transform: rotate(-10deg); }
        15%      { transform: rotate(-30deg); }
        40%      { transform: rotate(60deg); }
        60%      { transform: rotate(20deg); }
        80%      { transform: rotate(50deg); }
        100%     { transform: rotate(-10deg); }
      }

      /* Shadow bounce */
      @keyframes shadow-bounce {
        0%, 100% { transform: scaleX(1); opacity: 0.5; }
        25%      { transform: scaleX(0.94); opacity: 0.45; }
        50%      { transform: scaleX(1.06); opacity: 0.55; }
      }

      /* Steam rising from pan */
      @keyframes steam1 {
        0%   { opacity: 0; transform: translate(0, 0) scale(0.5); }
        20%  { opacity: 0.6; transform: translate(0, 0) scale(1); }
        100% { opacity: 0; transform: translate(-1px, -5px) scale(0.3); }
      }
      @keyframes steam2 {
        0%   { opacity: 0; transform: translate(0, 0) scale(0.5); }
        20%  { opacity: 0.5; transform: translate(0, 0) scale(1); }
        100% { opacity: 0; transform: translate(1px, -6px) scale(0.2); }
      }
      @keyframes steam3 {
        0%   { opacity: 0; transform: translate(0, 0) scale(0.5); }
        20%  { opacity: 0.5; transform: translate(0, 0) scale(1); }
        100% { opacity: 0; transform: translate(-0.5px, -4px) scale(0.3); }
      }
      @keyframes steam4 {
        0%   { opacity: 0; transform: translate(0, 0) scale(0.5); }
        20%  { opacity: 0.4; transform: translate(0, 0) scale(0.8); }
        100% { opacity: 0; transform: translate(0.5px, -5px) scale(0.2); }
      }

      /* Eyes look right toward spatula */
      @keyframes eyes-focus {
        0%, 100% { transform: translate(1px, 0); }
        30%      { transform: translate(1.5px, 0.5px); }
        60%      { transform: translate(1px, -0.3px); }
        80%      { transform: translate(0.5px, 0); }
      }

      /* Sweat */
      @keyframes sweat-fly {
        0%, 60%  { opacity: 0; transform: translate(0, 0) scale(0); }
        65%      { opacity: 1; transform: translate(0, 0) scale(1); }
        85%      { opacity: 0; transform: translate(-5px, -6px) scale(0.5); }
        100%     { opacity: 0; }
      }
    </style>
  </defs>

  <g transform="scale(1,-1)">

  <!-- Ground Shadow -->
  <rect class="shadow-anim" x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>

  <!-- Frying Pan -->
  <rect x="12" y="12" width="5" height="1" fill="#424242"/>

  <!-- Steam particles (from pan) -->
  <g fill="#B0BEC5">
    <rect class="steam steam-1" x="13" y="11" width="1" height="1"/>
    <rect class="steam steam-2" x="14.5" y="11.5" width="0.8" height="0.8"/>
    <rect class="steam steam-3" x="12.5" y="11" width="0.8" height="0.8"/>
    <rect class="steam steam-4" x="14" y="10.5" width="1" height="1"/>
  </g>

  <!-- Legs (bounce with body) -->
  <g class="body-bounce" fill="#DE886D">
    <rect x="3" y="12" width="1" height="3"/>
    <rect x="5" y="12" width="1" height="3"/>
    <rect x="9" y="12" width="1" height="3"/>
    <rect x="11" y="12" width="1" height="3"/>
  </g>

  <!-- Body group [bounce > breathe] -->
  <g class="body-bounce">
    <g class="breathe">

      <!-- Sweat drop -->
      <g transform="translate(1, 5)">
        <g class="sweat" fill="#40C4FF">
          <rect x="0" y="1" width="1.5" height="1.5"/>
          <rect x="0.25" y="0" width="1" height="1"/>
        </g>
      </g>

      <!-- Body core [squash] -->
      <g class="body-squash">

        <!-- Head Stripe -->
        <rect x="2" y="5" width="11" height="1" fill="#C07050"/>

        <!-- Tall White Chef Hat -->
        <rect x="4" y="0" width="7" height="1" fill="#FFF"/>
        <rect x="3" y="1" width="9" height="3" fill="#FFF"/>
        <rect x="4" y="4" width="7" height="1" fill="#FFF"/>

        <!-- Torso -->
        <rect x="2" y="6" width="11" height="6" fill="#DE886D"/>

        <!-- Eyes (focused right) -->
        <g class="eyes-focus">
          <g class="blink" fill="#000">
            <rect x="5" y="8" width="1" height="1"/>
            <rect x="10" y="8" width="1" height="1"/>
          </g>
        </g>

      </g>

      <!-- Left Arm (no squash) -->
      <rect x="0" y="9" width="2" height="2" fill="#DE886D"/>

    </g>
  </g>

  <!-- Right Arm + Spatula [bounce > breathe > flip] -->
  <g class="body-bounce">
    <g class="breathe">
      <g class="arm-r-flip">
        <rect x="13" y="9" width="2" height="2" fill="#DE886D"/>
        <!-- Spatula handle -->
        <rect x="14" y="7" width="1" height="5" fill="#795548"/>
        <!-- Spatula blade -->
        <rect x="13" y="6" width="3" height="2" fill="#9E9E9E"/>
      </g>
    </g>
  </g>

  </g>
</svg>
