<svg xmlns="http://www.w3.org/2000/svg" viewBox="-8 -16 32 18" preserveAspectRatio="xMidYMin meet" width="500" height="500">
  <defs>
    <style>
      .breathe {
        transform-origin: 7.5px 11px;
        animation: breathe 3.2s infinite ease-in-out;
      }
      .rock-sway {
        transform-origin: 7.5px 15px;
        animation: rock-body 1s infinite ease-in-out;
      }
      .body-bounce {
        transform-origin: 7.5px 15px;
        animation: body-bounce 1s infinite;
      }
      .shadow-anim {
        transform-origin: 7.5px 15.5px;
        animation: shadow-rock 1s infinite ease-in-out;
      }
      .strum {
        transform-origin: 7.5px 10px;
        animation: strum-pulse 0.5s infinite ease-in-out;
      }
      .string-vib {
        animation: string-vibrate 0.15s infinite linear;
      }

      /* Music notes */
      .note1 { animation: note-float-1 1.8s infinite ease-out; }
      .note2 { animation: note-float-2 2.2s 0.6s infinite ease-out; }
      .note3 { animation: note-float-3 2.0s 1.2s infinite ease-out; }
      .note4 { animation: note-float-4 1.9s 0.3s infinite ease-out; }
      .note5 { animation: note-float-5 2.1s 0.9s infinite ease-out; }

      /* Stage lights */
      .stage-light-1 { animation: stage-pulse-1 2.5s infinite ease-in-out; }
      .stage-light-2 { animation: stage-pulse-2 3s 0.8s infinite ease-in-out; }
      .stage-light-3 { animation: stage-pulse-3 2.2s 1.5s infinite ease-in-out; }

      /* Crowd bounce */
      .crowd-1 { animation: crowd-bounce 0.5s infinite ease-in-out; }
      .crowd-2 { animation: crowd-bounce 0.5s 0.15s infinite ease-in-out; }
      .crowd-3 { animation: crowd-bounce 0.5s 0.3s infinite ease-in-out; }

      @keyframes breathe {
        0%, 100% { transform: scale(1, 1) translate(0, 0); }
        50% { transform: scale(1.02, 0.98) translate(0, 0.5px); }
      }
      @keyframes rock-body {
        0%, 100% { transform: rotate(0deg); }
        25%      { transform: rotate(3deg); }
        75%      { transform: rotate(-3deg); }
      }
      @keyframes body-bounce {
        0%, 100% { transform: translateY(0); }
        25%      { transform: translateY(-1px); }
        50%      { transform: translateY(0.5px); }
        75%      { transform: translateY(-0.5px); }
      }
      @keyframes shadow-rock {
        0%, 100% { transform: scaleX(1); opacity: 0.5; }
        25%      { transform: scaleX(1.08); opacity: 0.55; }
        75%      { transform: scaleX(0.92); opacity: 0.45; }
      }
      @keyframes strum-pulse {
        0%, 100% { transform: scale(1, 1); }
        50%      { transform: scale(1.01, 0.99); }
      }
      @keyframes string-vibrate {
        0%   { transform: translateY(0); }
        25%  { transform: translateY(0.2px); }
        50%  { transform: translateY(0); }
        75%  { transform: translateY(-0.2px); }
        100% { transform: translateY(0); }
      }
      @keyframes note-float-1 {
        0%   { opacity: 1; transform: translate(0, 0); }
        100% { opacity: 0; transform: translate(-4px, -8px); }
      }
      @keyframes note-float-2 {
        0%   { opacity: 1; transform: translate(0, 0); }
        100% { opacity: 0; transform: translate(2px, -9px); }
      }
      @keyframes note-float-3 {
        0%   { opacity: 1; transform: translate(0, 0); }
        100% { opacity: 0; transform: translate(4px, -7px); }
      }
      @keyframes note-float-4 {
        0%   { opacity: 1; transform: translate(0, 0); }
        100% { opacity: 0; transform: translate(-2px, -10px); }
      }
      @keyframes note-float-5 {
        0%   { opacity: 1; transform: translate(0, 0); }
        100% { opacity: 0; transform: translate(3px, -8px); }
      }
      @keyframes stage-pulse-1 {
        0%, 100% { opacity: 0.05; }
        50% { opacity: 0.15; }
      }
      @keyframes stage-pulse-2 {
        0%, 100% { opacity: 0.04; }
        50% { opacity: 0.12; }
      }
      @keyframes stage-pulse-3 {
        0%, 100% { opacity: 0.06; }
        50% { opacity: 0.14; }
      }
      @keyframes crowd-bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-1px); }
      }
    </style>
  </defs>

  <g transform="scale(1,-1)">

  <!-- Stage Lights (background) -->
  <rect class="stage-light-1" x="-6" y="-10" width="8" height="26" fill="#E53935"/>
  <rect class="stage-light-2" x="4" y="-10" width="8" height="26" fill="#1E88E5"/>
  <rect class="stage-light-3" x="14" y="-10" width="8" height="26" fill="#AB47BC"/>

  <!-- Ground Shadow -->
  <rect class="shadow-anim" x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>

  <!-- Crowd (small bouncing pixel shapes at bottom) -->
  <g fill="#555">
    <g class="crowd-1">
      <rect x="-4" y="14" width="2" height="2"/>
      <rect x="-3" y="13" width="1" height="1"/>
    </g>
    <g class="crowd-2">
      <rect x="18" y="14" width="2" height="2"/>
      <rect x="19" y="13" width="1" height="1"/>
    </g>
    <g class="crowd-3">
      <rect x="-7" y="14" width="2" height="2"/>
      <rect x="21" y="14" width="2" height="2"/>
    </g>
  </g>

  <!-- Music Notes (float up) - more notes -->
  <g class="note1" fill="#E53935">
    <rect x="1" y="3" width="0.5" height="2.5"/>
    <rect x="0" y="5" width="1.5" height="1"/>
  </g>
  <g class="note2" fill="#FFC107">
    <rect x="14" y="2" width="0.5" height="2.5"/>
    <rect x="13" y="4" width="1.5" height="1"/>
  </g>
  <g class="note3" fill="#E53935">
    <rect x="8" y="1" width="0.5" height="2.5"/>
    <rect x="7" y="3" width="1.5" height="1"/>
  </g>
  <g class="note4" fill="#AB47BC">
    <rect x="-2" y="1" width="0.5" height="2.5"/>
    <rect x="-3" y="3" width="1.5" height="1"/>
  </g>
  <g class="note5" fill="#FFC107">
    <rect x="17" y="4" width="0.5" height="2.5"/>
    <rect x="16" y="6" width="1.5" height="1"/>
  </g>

  <!-- Legs -->
  <g class="body-bounce" fill="#DE886D">
    <rect x="3" y="12" width="1" height="3"/>
    <rect x="5" y="12" width="1" height="3"/>
    <rect x="9" y="12" width="1" height="3"/>
    <rect x="11" y="12" width="1" height="3"/>
  </g>

  <!-- Body group [bounce > rock-sway > breathe > strum] -->
  <g class="body-bounce">
    <g class="rock-sway">
      <g class="breathe">
        <g class="strum">

          <!-- Head Stripe -->
          <rect x="2" y="5" width="11" height="1" fill="#C07050"/>

          <!-- Torso -->
          <rect x="2" y="6" width="11" height="6" fill="#DE886D"/>

          <!-- Arms -->
          <rect x="0" y="9" width="2" height="2" fill="#DE886D"/>
          <rect x="13" y="9" width="2" height="2" fill="#DE886D"/>

          <!-- Guitar neck -->
          <rect x="-1" y="7" width="4" height="1" fill="#795548"/>

          <!-- Guitar body -->
          <rect x="13" y="9" width="3" height="3" fill="#E53935"/>
          <rect x="12" y="10" width="1" height="1" fill="#E53935"/>
          <!-- Sound hole -->
          <rect x="14" y="10" width="1" height="1" fill="#212121"/>

          <!-- Guitar strings (with vibration) -->
          <rect class="string-vib" x="2" y="10" width="11" height="0.3" fill="#FFC107" opacity="0.5"/>

          <!-- Dark Sunglasses -->
          <rect x="3" y="7" width="4" height="2" fill="#212121"/>
          <rect x="8" y="7" width="4" height="2" fill="#212121"/>
          <rect x="7" y="7" width="1" height="1" fill="#212121"/>
          <!-- Lens shine -->
          <rect x="4" y="7" width="1" height="1" fill="#424242"/>
          <rect x="9" y="7" width="1" height="1" fill="#424242"/>

        </g>
      </g>
    </g>
  </g>

  </g>
</svg>