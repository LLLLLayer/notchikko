<svg xmlns="http://www.w3.org/2000/svg" viewBox="-8 -16 32 18" width="500" height="500" preserveAspectRatio="xMidYMin meet">
  <defs>
    <style>
      .victory-bounce {
        transform-origin: 7.5px 15px;
        animation: victory-bounce 1s infinite ease-in-out;
      }
      .breathe {
        transform-origin: 7.5px 10px;
        animation: breathe 3.2s infinite ease-in-out;
      }
      .focused-blink {
        transform-origin: 7.5px 8px;
        animation: focused-blink 5s infinite;
      }
      .controller-vibrate {
        animation: vibrate 0.08s infinite linear;
      }
      .score-popup {
        animation: score-pop 2.5s infinite ease-out;
      }
      .shadow-anim {
        transform-origin: 7.5px 15.5px;
        animation: shadow-bounce 1s infinite ease-in-out;
      }

      /* Confetti particles */
      .confetti {
        animation: confetti-fall var(--dur, 2s) infinite linear;
        animation-delay: var(--delay, 0s);
      }

      @keyframes victory-bounce {
        0%, 15%, 100% { transform: translateY(0) scaleY(1); }
        20% { transform: translateY(0) scaleY(0.88); }
        40% { transform: translateY(-8px) scaleY(1.04); }
        50% { transform: translateY(-10px) scaleY(1); }
        60% { transform: translateY(-8px) scaleY(1.04); }
        80% { transform: translateY(0) scaleY(0.88); }
        85% { transform: translateY(0) scaleY(1); }
      }
      @keyframes breathe {
        0%, 100% { transform: scale(1, 1) translate(0, 0); }
        50% { transform: scale(1.02, 0.98) translate(0, 0.5px); }
      }
      @keyframes focused-blink {
        0%, 10%, 100% { transform: scaleY(1); }
        5% { transform: scaleY(0.1); }
      }
      @keyframes vibrate {
        0% { transform: translate(0, 0); }
        25% { transform: translate(0.4px, 0.4px); }
        50% { transform: translate(0, -0.4px); }
        75% { transform: translate(-0.4px, 0.4px); }
        100% { transform: translate(0, 0); }
      }
      @keyframes score-pop {
        0%, 50% { opacity: 0; transform: translate(0,0) scale(0); }
        55% { opacity: 1; transform: translate(0,0) scale(1.2); }
        65% { opacity: 1; transform: translate(0,-1px) scale(1); }
        85% { opacity: 0.5; transform: translate(1px,-4px) scale(0.8); }
        100% { opacity: 0; transform: translate(2px,-6px) scale(0.5); }
      }
      @keyframes shadow-bounce {
        0%, 15%, 100% { transform: scaleX(1); opacity: 0.5; }
        20% { transform: scaleX(1.08); opacity: 0.6; }
        40% { transform: scaleX(0.65); opacity: 0.25; }
        50% { transform: scaleX(0.55); opacity: 0.2; }
        60% { transform: scaleX(0.65); opacity: 0.25; }
        80% { transform: scaleX(1.08); opacity: 0.6; }
        85% { transform: scaleX(1); opacity: 0.5; }
      }
      @keyframes confetti-fall {
        0% { transform: translate(var(--sx, 0px), -16px) rotate(0deg); opacity: 1; }
        50% { transform: translate(calc(var(--sx, 0px) + var(--sway, 2px)), 0px) rotate(180deg); opacity: 1; }
        100% { transform: translate(var(--sx, 0px), 16px) rotate(360deg); opacity: 0; }
      }
    </style>
  </defs>
  <g transform="scale(1,-1)">

    <!-- Shadow -->
    <rect class="shadow-anim" x="1" y="15" width="14" height="1" fill="#000"/>

    <!-- Confetti particles -->
    <rect class="confetti" x="0" y="-10" width="1" height="1" fill="#E53935" style="--delay:0s; --dur:2.2s; --sx:0px; --sway:3px"/>
    <rect class="confetti" x="4" y="-10" width="1" height="1" fill="#1E88E5" style="--delay:0.3s; --dur:1.8s; --sx:2px; --sway:-2px"/>
    <rect class="confetti" x="8" y="-10" width="1" height="1" fill="#4CAF50" style="--delay:0.6s; --dur:2.4s; --sx:-1px; --sway:2px"/>
    <rect class="confetti" x="12" y="-10" width="1" height="1" fill="#FFC107" style="--delay:0.1s; --dur:2s; --sx:1px; --sway:-3px"/>
    <rect class="confetti" x="16" y="-10" width="1" height="1" fill="#E53935" style="--delay:0.8s; --dur:2.1s; --sx:-2px; --sway:2px"/>
    <rect class="confetti" x="2" y="-10" width="1" height="1" fill="#1E88E5" style="--delay:1.2s; --dur:1.9s; --sx:1px; --sway:-2px"/>
    <rect class="confetti" x="10" y="-10" width="1" height="1" fill="#4CAF50" style="--delay:0.5s; --dur:2.3s; --sx:-1px; --sway:3px"/>
    <rect class="confetti" x="14" y="-10" width="1" height="1" fill="#FFC107" style="--delay:0.9s; --dur:2s; --sx:2px; --sway:-2px"/>

    <!-- Legs -->
    <g class="victory-bounce" fill="#DE886D">
      <rect x="3" y="12" width="1" height="3"/>
      <rect x="5" y="12" width="1" height="3"/>
      <rect x="9" y="12" width="1" height="3"/>
      <rect x="11" y="12" width="1" height="3"/>
    </g>

    <!-- Body -->
    <g class="victory-bounce">
      <g class="breathe">
        <!-- Head stripe -->
        <rect x="2" y="5" width="11" height="1" fill="#C07050"/>
        <!-- Body -->
        <rect x="2" y="6" width="11" height="6" fill="#DE886D"/>
        <!-- Arms -->
        <rect x="0" y="9" width="2" height="2" fill="#DE886D"/>
        <rect x="13" y="9" width="2" height="2" fill="#DE886D"/>

        <!-- Eyes -->
        <g class="focused-blink" fill="#000">
          <rect x="5" y="8" width="1" height="1"/>
          <rect x="10" y="8" width="1" height="1"/>
        </g>

        <!-- Controller (excited vibration) -->
        <g class="controller-vibrate">
          <rect x="3" y="10" width="9" height="2" fill="#424242"/>
          <rect x="2" y="11" width="2" height="2" fill="#424242"/>
          <rect x="11" y="11" width="2" height="2" fill="#424242"/>
          <rect x="3" y="10" width="1" height="1" fill="#757575"/>
          <rect x="4" y="11" width="1" height="1" fill="#757575"/>
          <rect x="9" y="10" width="1" height="1" fill="#4CAF50"/>
          <rect x="11" y="10" width="1" height="1" fill="#E53935"/>
          <rect x="10" y="11" width="1" height="1" fill="#1E88E5"/>
        </g>

        <!-- Score popup +100 (more prominent) -->
        <g class="score-popup">
          <text x="15" y="4" font-family="monospace" font-size="3" font-weight="700" fill="#FFC107">+100</text>
        </g>
      </g>
    </g>

  </g>
</svg>