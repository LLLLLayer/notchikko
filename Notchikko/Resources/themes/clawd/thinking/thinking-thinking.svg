<svg xmlns="http://www.w3.org/2000/svg" viewBox="-8 -16 32 18" preserveAspectRatio="xMidYMin meet" width="500" height="500">
  <defs>
    <style>
      /* === 12s master timeline === */

      /* Body: one subtle lean at the thinking moment */
      .body-master {
        transform-origin: 7.5px 12px;
        animation: body-think 12s infinite ease-in-out;
      }

      /* Breathing: constant 3.2s cycle */
      .breathe {
        transform-origin: 7.5px 10px;
        animation: breathe 3.2s infinite ease-in-out;
      }

      /* Shadow follows body */
      .shadow-think {
        animation: shadow-think 12s infinite ease-in-out;
      }

      /* Right arm: resting on chin */
      .arm-r {
        transform-origin: 13px 9px;
        animation: arm-r-think 12s infinite ease-in-out;
      }

      /* Left arm: slight shift with body */
      .arm-l {
        transform-origin: 2px 9px;
        animation: arm-l-think 12s infinite ease-in-out;
      }

      /* Eyes: gaze upward + blink */
      .eye {
        transform-box: fill-box;
        transform-origin: center;
        animation: eyes-think 12s infinite ease-in-out;
      }

      /* === Bubble edge morph === */
      .bubble-main {
        animation: morph-main 6s infinite ease-in-out;
      }
      .bubble-h {
        animation: morph-h 5s infinite ease-in-out;
      }
      .bubble-v {
        animation: morph-v 4s infinite ease-in-out;
      }

      /* === Loading dots (2s) === */
      .dot { opacity: 0; }
      .d1 { animation: load-dot-1 2s infinite; }
      .d2 { animation: load-dot-2 2s infinite; }
      .d3 { animation: load-dot-3 2s infinite; }

      /* ==================== Keyframes ==================== */

      @keyframes body-think {
        0%, 35%, 80%, 100% { transform: rotate(0deg) translate(0, 0); }
        50%                { transform: rotate(1.5deg) translate(0.3px, 0); }
      }

      @keyframes shadow-think {
        0%, 35%, 80%, 100% { transform: translate(0, 0); }
        50%                { transform: translate(0.3px, 0); }
      }

      @keyframes breathe {
        0%, 100% { transform: scale(1, 1) translate(0, 0); }
        50%      { transform: scale(1.02, 0.98) translate(0, 0.5px); }
      }

      /* Right arm on chin: -130deg base, one slow press */
      @keyframes arm-r-think {
        0%, 38%, 75%, 100% { transform: rotate(-130deg); }
        52%                { transform: rotate(-138deg); }
        62%                { transform: rotate(-127deg); }
      }

      /* Left arm: resting slightly forward */
      @keyframes arm-l-think {
        0%, 40%, 78%, 100% { transform: rotate(22deg); }
        55%                { transform: rotate(26deg); }
      }

      /* Eyes: gaze upward toward bubble + blinks */
      @keyframes eyes-think {
        0%   { transform: translate(0.3px, -0.3px) scaleY(1); }
        14%  { transform: translate(0.3px, -0.3px) scaleY(1); }
        16%  { transform: translate(0.3px, -0.3px) scaleY(0.1); }
        18%  { transform: translate(0.3px, -0.3px) scaleY(1); }
        42%  { transform: translate(0.3px, -0.3px) scaleY(1); }
        44%  { transform: translate(0.3px, -0.3px) scaleY(0.1); }
        46%  { transform: translate(0.3px, -0.3px) scaleY(1); }
        56%  { transform: translate(-0.3px, 0) scaleY(1); }
        70%  { transform: translate(-0.3px, 0) scaleY(1); }
        74%  { transform: translate(-0.3px, 0) scaleY(1); }
        76%  { transform: translate(-0.3px, 0) scaleY(0.1); }
        78%  { transform: translate(-0.3px, 0) scaleY(1); }
        88%  { transform: translate(0.3px, -0.3px) scaleY(1); }
        100% { transform: translate(0.3px, -0.3px) scaleY(1); }
      }

      /* Bubble morphing */
      @keyframes morph-main {
        0%, 100% { transform: translate(0, 0); }
        50%      { transform: translate(0, -0.3px); }
      }
      @keyframes morph-h {
        0%, 100% { transform: translate(0, 0); }
        50%      { transform: translate(0.3px, 0); }
      }
      @keyframes morph-v {
        0%, 100% { transform: translate(0, 0); }
        50%      { transform: translate(0, 0.3px); }
      }

      /* Loading dots */
      @keyframes load-dot-1 {
        0%, 20%  { opacity: 0; }
        21%, 100% { opacity: 1; }
      }
      @keyframes load-dot-2 {
        0%, 40%  { opacity: 0; }
        41%, 100% { opacity: 1; }
      }
      @keyframes load-dot-3 {
        0%, 60%  { opacity: 0; }
        61%, 100% { opacity: 1; }
      }
    </style>
  </defs>
  <g transform="scale(1,-1)">

  <!-- Thinking Bubble (upper-right of pig) -->
  <g class="think-bubble">
    <g fill="#FFFFFF" opacity="0.9">
      <!-- Main bubble body -->
      <rect class="bubble-main" x="12" y="1" width="8" height="5"/>
      <rect class="bubble-h" x="11" y="2" width="10" height="3"/>
      <rect class="bubble-v" x="13" y="0" width="6" height="7"/>
      <!-- Trail dots leading from pig head to bubble -->
      <rect x="12" y="6" width="2" height="1"/>
      <rect x="13" y="7" width="1" height="1"/>
    </g>
    <!-- Loading dots -->
    <g fill="#0082FC">
      <rect class="dot d1" x="13.5" y="3" width="1" height="1"/>
      <rect class="dot d2" x="15.5" y="3" width="1" height="1"/>
      <rect class="dot d3" x="17.5" y="3" width="1" height="1"/>
    </g>
  </g>

  <!-- Shadow -->
  <rect class="shadow-think" x="3" y="15" width="9" height="1" fill="#000000" opacity="0.4"/>

  <!-- Character -->
  <g class="body-master">
    <g class="breathe">
      <!-- Head stripe -->
      <rect x="2" y="5" width="11" height="1" fill="#C07050"/>
      <!-- Body -->
      <rect x="2" y="6" width="11" height="6" fill="#DE886D"/>
      <!-- Left arm -->
      <g class="arm-l">
        <rect x="0" y="9" width="2" height="2" fill="#DE886D"/>
      </g>
      <!-- Right arm (on chin) -->
      <g class="arm-r">
        <rect x="13" y="9" width="2" height="2" fill="#DE886D"/>
      </g>
      <!-- Legs -->
      <g fill="#DE886D">
        <rect x="3" y="12" width="1" height="3"/>
        <rect x="5" y="12" width="1" height="3"/>
        <rect x="9" y="12" width="1" height="3"/>
        <rect x="11" y="12" width="1" height="3"/>
      </g>
      <!-- Eyes -->
      <g fill="#000000">
        <rect class="eye" x="5" y="8" width="1" height="1"/>
        <rect class="eye" x="10" y="8" width="1" height="1"/>
      </g>
    </g>
  </g>

  </g>
</svg>
