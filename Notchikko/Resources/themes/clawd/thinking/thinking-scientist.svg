<svg xmlns="http://www.w3.org/2000/svg" viewBox="-8 -16 32 18" preserveAspectRatio="xMidYMin meet" width="500" height="500">
  <defs>
    <style>
      .breathe {
        transform-origin: 7.5px 10px;
        animation: breathe 3.2s infinite ease-in-out;
      }
      .blink {
        transform-origin: 7.5px 8px;
        animation: blink 4s infinite;
      }
      .eyes-track {
        animation: eyes-track 4s infinite ease-in-out;
      }
      .body-bounce {
        transform-origin: 7.5px 15px;
        animation: body-bounce 0.6s infinite;
      }
      .tube-shake {
        transform-origin: 15px 8px;
        animation: tube-shake 0.3s infinite;
      }
      .liquid-color {
        animation: liquid-cycle 4s infinite;
      }
      .bubble1 { opacity: 0; animation: bubble-rise 2s 0s infinite; }
      .bubble2 { opacity: 0; animation: bubble-rise 2s 0.33s infinite; }
      .bubble3 { opacity: 0; animation: bubble-rise 2s 0.66s infinite; }
      .bubble4 { opacity: 0; animation: bubble-rise 2s 1s infinite; }
      .bubble5 { opacity: 0; animation: bubble-rise 2s 1.33s infinite; }
      .bubble6 { opacity: 0; animation: bubble-rise 2s 1.66s infinite; }
      .flash {
        opacity: 0;
        animation: reaction-flash 4s infinite;
      }
      .shadow-anim {
        transform-origin: 7.5px 15.5px;
        animation: shadow-bounce 0.6s infinite;
      }

      @keyframes breathe {
        0%, 100% { transform: scale(1, 1); }
        50% { transform: scale(1.02, 0.98); }
      }
      @keyframes blink {
        0%, 10%, 100% { transform: scaleY(1); }
        5% { transform: scaleY(0.1); }
      }
      @keyframes eyes-track {
        0%, 100% { transform: translate(0.5px, 0); }
        40% { transform: translate(0.8px, -0.2px); }
        70% { transform: translate(0.3px, 0.2px); }
      }
      @keyframes body-bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-0.8px); }
      }
      @keyframes tube-shake {
        0%, 100% { transform: rotate(0deg); }
        25% { transform: rotate(5deg); }
        75% { transform: rotate(-5deg); }
      }
      @keyframes liquid-cycle {
        0%, 100% { fill: #4CAF50; }
        33% { fill: #2196F3; }
        66% { fill: #9C27B0; }
      }
      @keyframes bubble-rise {
        0% { opacity: 0.8; transform: translate(0, 0) scale(1); }
        100% { opacity: 0; transform: translate(0, -6px) scale(0.3); }
      }
      @keyframes reaction-flash {
        0%, 85% { opacity: 0; }
        88% { opacity: 0.8; }
        92% { opacity: 0; }
        95% { opacity: 0.5; }
        100% { opacity: 0; }
      }
      @keyframes shadow-bounce {
        0%, 100% { transform: scaleX(1); opacity: 0.5; }
        50% { transform: scaleX(0.98); opacity: 0.48; }
      }
    </style>
  </defs>
  <g transform="scale(1,-1)">

  <!-- Shadow -->
  <rect class="shadow-anim" x="3" y="15" width="9" height="1" fill="#000"/>

  <!-- Legs -->
  <g fill="#DE886D">
    <rect x="3" y="12" width="1" height="3"/>
    <rect x="5" y="12" width="1" height="3"/>
    <rect x="9" y="12" width="1" height="3"/>
    <rect x="11" y="12" width="1" height="3"/>
  </g>

  <!-- Body group: bounce > breathe -->
  <g class="body-bounce">
    <g class="breathe">

      <!-- Head stripe -->
      <rect x="2" y="5" width="11" height="1" fill="#C07050"/>
      <!-- Body -->
      <rect x="2" y="6" width="11" height="6" fill="#DE886D"/>

      <!-- Lab coat overlay -->
      <rect x="2" y="8" width="11" height="4" fill="#FFF" opacity="0.3"/>

      <!-- Goggles -->
      <rect x="3" y="7" width="4" height="2" fill="#78909C"/>
      <rect x="8" y="7" width="4" height="2" fill="#78909C"/>
      <rect x="7" y="7" width="1" height="1" fill="#78909C"/>
      <!-- Lenses -->
      <rect x="4" y="7" width="2" height="1" fill="#B3E5FC"/>
      <rect x="9" y="7" width="2" height="1" fill="#B3E5FC"/>

      <!-- Eyes behind goggles -->
      <g class="eyes-track">
        <g class="blink" fill="#000">
          <rect x="5" y="8" width="1" height="1"/>
          <rect x="10" y="8" width="1" height="1"/>
        </g>
      </g>

      <!-- Left arm -->
      <rect x="0" y="9" width="2" height="2" fill="#DE886D"/>

      <!-- Right arm + test tube -->
      <g class="tube-shake">
        <rect x="13" y="9" width="2" height="2" fill="#DE886D"/>

        <!-- Test tube cap -->
        <rect x="14" y="5" width="2" height="1" fill="#9E9E9E"/>
        <!-- Test tube glass -->
        <rect x="14" y="6" width="2" height="4" fill="#B3E5FC" opacity="0.6"/>
        <!-- Liquid -->
        <rect class="liquid-color" x="14" y="7" width="2" height="3"/>

        <!-- Bubbles -->
        <rect class="bubble1" x="14.3" y="7" width="0.5" height="0.5" fill="#FFF" opacity="0.6"/>
        <rect class="bubble2" x="15.2" y="7.5" width="0.4" height="0.4" fill="#FFF" opacity="0.6"/>
        <rect class="bubble3" x="14.7" y="8" width="0.5" height="0.5" fill="#FFF" opacity="0.6"/>
        <rect class="bubble4" x="15.5" y="7.2" width="0.3" height="0.3" fill="#FFF" opacity="0.6"/>
        <rect class="bubble5" x="14.5" y="8.5" width="0.4" height="0.4" fill="#FFF" opacity="0.6"/>
        <rect class="bubble6" x="15" y="7.8" width="0.5" height="0.5" fill="#FFF" opacity="0.6"/>

        <!-- Reaction flash -->
        <rect class="flash" x="13.5" y="5.5" width="3" height="5" fill="#FFF" opacity="0.6"/>
      </g>

    </g>
  </g>

  </g>
</svg>
