<svg xmlns="http://www.w3.org/2000/svg" viewBox="-8 -16 32 18" width="500" height="500" preserveAspectRatio="xMidYMin meet">
  <defs>
    <style>
      .breathe {
        transform-origin: 8px 10px;
        animation: breathe 3.2s infinite ease-in-out;
      }
      .blink {
        transform-origin: 7px 9px;
        animation: blink 4s infinite;
      }
      .bulb-bob {
        animation: bulb-bob 3s infinite ease-in-out;
      }
      .glow-pulse {
        animation: glow-pulse 2s infinite ease-in-out;
      }

      @keyframes breathe {
        0%, 100% { transform: scale(1, 1) translate(0, 0); }
        50% { transform: scale(1.02, 0.98) translate(0, 0.5px); }
      }
      @keyframes blink {
        0%, 10%, 100% { transform: scaleY(1); }
        5% { transform: scaleY(0.1); }
      }
      @keyframes bulb-bob {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-1.5px); }
      }
      @keyframes glow-pulse {
        0%, 100% { opacity: 0.8; }
        50% { opacity: 1; }
      }
    </style>
  </defs>
  <g transform="scale(1,-1)">

    <!-- Shadow -->
    <rect x="1" y="15" width="14" height="1" fill="#000" opacity="0.4"/>

    <!-- Legs -->
    <g fill="#DE886D">
      <rect x="3" y="13" width="1" height="2"/>
      <rect x="5" y="13" width="1" height="2"/>
      <rect x="11" y="13" width="1" height="2"/>
      <rect x="13" y="13" width="1" height="2"/>
    </g>

    <!-- Body -->
    <g class="breathe">
      <!-- Ear -->
      <rect x="13" y="5" width="2" height="1" fill="#DE886D"/>
      <!-- Main body -->
      <rect x="2" y="6" width="13" height="7" fill="#DE886D"/>
      <!-- Snout -->
      <rect x="0" y="9" width="2" height="3" fill="#DE886D"/>
      <!-- Eyes -->
      <g class="blink" fill="#000">
        <rect x="4" y="9" width="1" height="1"/>
        <rect x="9" y="9" width="1" height="1"/>
      </g>
    </g>

    <!-- Lightbulb -->
    <g class="bulb-bob">
      <!-- Cap -->
      <rect x="8" y="-1" width="1" height="1" fill="#8B8B00"/>
      <!-- Glass -->
      <g class="glow-pulse" fill="#FBC02D">
        <rect x="7" y="0" width="3" height="1"/>
        <rect x="6" y="1" width="5" height="1"/>
        <rect x="5" y="2" width="7" height="1"/>
        <rect x="5" y="3" width="7" height="1"/>
        <rect x="6" y="4" width="5" height="1"/>
        <rect x="7" y="5" width="3" height="1"/>
      </g>
      <!-- Highlights -->
      <rect x="7" y="2" width="2" height="1" fill="#FFF59D"/>
      <rect x="8" y="3" width="2" height="1" fill="#FFF59D"/>
      <!-- Socket -->
      <rect x="7" y="6" width="3" height="1" fill="#9E9E9E"/>
    </g>

  </g>
</svg>
