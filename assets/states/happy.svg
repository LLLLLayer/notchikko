<svg xmlns="http://www.w3.org/2000/svg" viewBox="-8 -16 32 18" preserveAspectRatio="xMidYMin meet" width="500" height="500">
  <defs>
    <style>
      .breathe-anim {
        transform-origin: 7.5px -9px;
        animation: breathe 3.2s infinite ease-in-out;
      }

      .lion-bounce {
        animation: lion-dance 1s infinite ease-in-out;
        transform-origin: 7.5px -12px;
      }

      @keyframes breathe {
        0%, 100% { transform: scale(1, 1) translate(0, 0); }
        50% { transform: scale(1.02, 0.98) translate(0, -0.5px); }
      }

      @keyframes lion-dance {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        25% { transform: translateY(0.8px) rotate(-1deg); }
        50% { transform: translateY(0) rotate(0deg); }
        75% { transform: translateY(0.8px) rotate(1deg); }
      }

      @keyframes firecracker-pop1 {
        0%, 80% { opacity: 0; transform: scale(0); }
        85% { opacity: 1; transform: scale(1.5); }
        90% { opacity: 1; transform: scale(1); }
        100% { opacity: 0; transform: scale(0.5); }
      }

      @keyframes firecracker-pop2 {
        0%, 60% { opacity: 0; transform: scale(0); }
        65% { opacity: 1; transform: scale(1.5); }
        75% { opacity: 1; transform: scale(1); }
        85% { opacity: 0; transform: scale(0.5); }
        100% { opacity: 0; }
      }

      @keyframes firecracker-pop3 {
        0%, 40% { opacity: 0; transform: scale(0); }
        45% { opacity: 1; transform: scale(1.5); }
        55% { opacity: 1; transform: scale(1); }
        65% { opacity: 0; transform: scale(0.5); }
        100% { opacity: 0; }
      }

      @keyframes firecracker-pop4 {
        0%, 20% { opacity: 0; transform: scale(0); }
        25% { opacity: 1; transform: scale(1.5); }
        35% { opacity: 1; transform: scale(1); }
        45% { opacity: 0; transform: scale(0.5); }
        100% { opacity: 0; }
      }

      .fc1 { animation: firecracker-pop1 2s infinite; transform-box: fill-box; transform-origin: center; }
      .fc2 { animation: firecracker-pop2 2s infinite; transform-box: fill-box; transform-origin: center; }
      .fc3 { animation: firecracker-pop3 2s infinite; transform-box: fill-box; transform-origin: center; }
      .fc4 { animation: firecracker-pop4 2s infinite; transform-box: fill-box; transform-origin: center; }

      @keyframes coin-float {
        0% { transform: translateY(0); opacity: 0; }
        20% { opacity: 1; }
        80% { opacity: 1; }
        100% { transform: translateY(-8px); opacity: 0; }
      }

      .coin1 { animation: coin-float 3s infinite ease-out; animation-delay: 0s; }
      .coin2 { animation: coin-float 3s infinite ease-out; animation-delay: 1s; }
      .coin3 { animation: coin-float 3s infinite ease-out; animation-delay: 2s; }

      @keyframes spark-burst {
        0%, 90% { opacity: 0; }
        92% { opacity: 1; }
        100% { opacity: 0; }
      }

      .spark1 { animation: spark-burst 2s infinite; animation-delay: 0.1s; }
      .spark2 { animation: spark-burst 2s infinite; animation-delay: 0.6s; }
      .spark3 { animation: spark-burst 2s infinite; animation-delay: 1.1s; }
      .spark4 { animation: spark-burst 2s infinite; animation-delay: 1.6s; }
    </style>
  </defs>

  <g transform="scale(1,-1)">
    <!-- Shadow -->
    <rect x="3" y="15" width="9" height="1" fill="#000" opacity="0.15"/>

    <!-- Legs -->
    <g fill="#DE886D">
      <rect x="3" y="12" width="1" height="3"/>
      <rect x="5" y="12" width="1" height="3"/>
      <rect x="9" y="12" width="1" height="3"/>
      <rect x="11" y="12" width="1" height="3"/>
    </g>

    <!-- Body -->
    <g class="lion-bounce">
      <g class="breathe-anim">
        <!-- Head stripe -->
        <rect x="2" y="5" width="11" height="1" fill="#C07050"/>
        <!-- Torso -->
        <rect x="2" y="6" width="11" height="6" fill="#DE886D"/>
        <!-- Arms -->
        <rect x="0" y="9" width="2" height="2" fill="#DE886D"/>
        <rect x="13" y="9" width="2" height="2" fill="#DE886D"/>
        <!-- Eyes (peeking below lion head) -->
        <rect x="5" y="8" width="1" height="1" fill="#000"/>
        <rect x="10" y="8" width="1" height="1" fill="#000"/>

        <!-- Lion Dance Head -->
        <rect x="2" y="2" width="11" height="3" fill="#E53935"/>
        <!-- Lion eyes -->
        <rect x="4" y="3" width="2" height="1" fill="#FFC107" rx="0.5"/>
        <rect x="9" y="3" width="2" height="1" fill="#FFC107" rx="0.5"/>
        <!-- Lion teeth -->
        <rect x="5" y="5" width="5" height="1" fill="#FFFFFF"/>
      </g>
    </g>

    <!-- Firecrackers with sparks -->
    <g class="fc1">
      <rect x="-3" y="-2" width="1" height="1" fill="#E53935"/>
      <rect class="spark1" x="-4" y="-3" width="1" height="1" fill="#FFC107"/>
      <rect class="spark1" x="-2" y="-3" width="1" height="1" fill="#FFC107"/>
    </g>
    <g class="fc2">
      <rect x="16" y="-4" width="1" height="1" fill="#E53935"/>
      <rect class="spark2" x="15" y="-5" width="1" height="1" fill="#FFC107"/>
      <rect class="spark2" x="17" y="-5" width="1" height="1" fill="#FFC107"/>
    </g>
    <g class="fc3">
      <rect x="-5" y="-6" width="1" height="1" fill="#E53935"/>
      <rect class="spark3" x="-6" y="-7" width="1" height="1" fill="#FFC107"/>
      <rect class="spark3" x="-4" y="-7" width="1" height="1" fill="#FFC107"/>
    </g>
    <g class="fc4">
      <rect x="18" y="-1" width="1" height="1" fill="#E53935"/>
      <rect class="spark4" x="17" y="-2" width="1" height="1" fill="#FFC107"/>
      <rect class="spark4" x="19" y="-2" width="1" height="1" fill="#FFC107"/>
    </g>

    <!-- Gold coins floating -->
    <rect class="coin1" x="-1" y="0" width="1" height="1" fill="#FBC02D"/>
    <rect class="coin2" x="15" y="-3" width="1" height="1" fill="#FBC02D"/>
    <rect class="coin3" x="7" y="-6" width="1" height="1" fill="#FBC02D"/>
  </g>
</svg>
