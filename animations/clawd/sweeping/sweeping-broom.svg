<svg xmlns="http://www.w3.org/2000/svg" viewBox="-8 -16 32 18" preserveAspectRatio="xMidYMin meet" width="500" height="500">
  <defs>
    <style>
      .breathe {
        transform-origin: 7.5px 10px;
        animation: breathe 3.2s infinite ease-in-out;
      }
      .eye {
        transform-box: fill-box;
        transform-origin: center;
        animation: eye-blink 4s infinite;
      }
      .body-sweep {
        transform-origin: 7.5px 12px;
        animation: body-sway 2s infinite ease-in-out;
      }
      .broom-group {
        transform-origin: 14px 9px;
        animation: broom-sweep 2s infinite ease-in-out;
      }
      .dust {
        opacity: 0;
      }
      .d1 { animation: dust-puff-1 2s infinite ease-out; }
      .d2 { animation: dust-puff-2 2s 0.7s infinite ease-out; }
      .d3 { animation: dust-puff-3 2s 1.4s infinite ease-out; }
      .shadow-anim {
        transform-origin: 7.5px 15.5px;
        animation: shadow-sway 2s infinite ease-in-out;
      }

      @keyframes breathe {
        0%, 100% { transform: scale(1, 1) translate(0, 0); }
        50% { transform: scale(1.02, 0.98) translate(0, 0.5px); }
      }
      @keyframes eye-blink {
        0%, 6%, 100% { transform: scaleY(1); }
        3% { transform: scaleY(0.1); }
      }
      @keyframes body-sway {
        0%, 100% { transform: rotate(-2deg); }
        50% { transform: rotate(2deg); }
      }
      @keyframes broom-sweep {
        0%, 100% { transform: rotate(-30deg); }
        50% { transform: rotate(30deg); }
      }
      @keyframes dust-puff-1 {
        0%, 5% { opacity: 0; transform: translate(0, 0); }
        15% { opacity: 0.5; }
        100% { opacity: 0; transform: translate(-4px, 2px); }
      }
      @keyframes dust-puff-2 {
        0%, 5% { opacity: 0; transform: translate(0, 0); }
        15% { opacity: 0.4; }
        100% { opacity: 0; transform: translate(3px, 3px); }
      }
      @keyframes dust-puff-3 {
        0%, 5% { opacity: 0; transform: translate(0, 0); }
        15% { opacity: 0.5; }
        100% { opacity: 0; transform: translate(-2px, 4px); }
      }
      @keyframes shadow-sway {
        0%, 100% { transform: scaleX(0.95) translateX(-0.5px); }
        50% { transform: scaleX(0.95) translateX(0.5px); }
      }
    </style>
  </defs>
  <g transform="scale(1,-1)">

  <!-- Shadow -->
  <rect class="shadow-anim" x="3" y="15" width="9" height="1" fill="#000" opacity="0.4"/>

  <!-- Legs -->
  <g fill="#DE886D">
    <rect x="3" y="12" width="1" height="3"/>
    <rect x="5" y="12" width="1" height="3"/>
    <rect x="9" y="12" width="1" height="3"/>
    <rect x="11" y="12" width="1" height="3"/>
  </g>

  <g class="body-sweep">
    <g class="breathe">
      <!-- Bandana -->
      <rect x="2" y="5" width="11" height="1" fill="#42A5F5"/>
      <rect x="1" y="5" width="1" height="1" fill="#1E88E5"/>
      <rect x="13" y="5" width="1" height="1" fill="#1E88E5"/>
      <!-- Bandana tail -->
      <rect x="13" y="4" width="2" height="1" fill="#42A5F5"/>

      <!-- Body -->
      <rect x="2" y="6" width="11" height="6" fill="#DE886D"/>
      <!-- Left arm -->
      <rect x="0" y="9" width="2" height="2" fill="#DE886D"/>
      <!-- Eyes -->
      <rect class="eye" x="5" y="8" width="1" height="1" fill="#000"/>
      <rect class="eye" x="10" y="8" width="1" height="1" fill="#000"/>
      <!-- Determined mouth -->
      <rect x="7" y="7" width="2" height="0.4" fill="#000" opacity="0.3"/>

      <!-- Right arm (holding broom) -->
      <rect x="13" y="8" width="2" height="3" fill="#DE886D"/>

      <!-- Broom -->
      <g class="broom-group">
        <!-- Handle -->
        <rect x="14" y="3" width="1" height="6" fill="#A1887F"/>
        <!-- Binding -->
        <rect x="13" y="2" width="3" height="1" fill="#78909C"/>
        <!-- Bristles -->
        <rect x="12" y="-1" width="1" height="3" fill="#FBC02D"/>
        <rect x="13" y="-2" width="1" height="4" fill="#F9A825"/>
        <rect x="14" y="-2" width="1" height="4" fill="#FBC02D"/>
        <rect x="15" y="-2" width="1" height="4" fill="#F9A825"/>
        <rect x="16" y="-1" width="1" height="3" fill="#FBC02D"/>
      </g>
    </g>
  </g>

  <!-- Dust particles -->
  <rect class="dust d1" x="12" y="0" width="1" height="1" fill="#B0BEC5"/>
  <rect class="dust d2" x="16" y="-1" width="1" height="1" fill="#CFD8DC"/>
  <rect class="dust d3" x="10" y="1" width="1" height="1" fill="#B0BEC5"/>

  </g>
</svg>
