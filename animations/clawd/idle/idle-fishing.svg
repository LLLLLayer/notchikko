<svg xmlns="http://www.w3.org/2000/svg" viewBox="-8 -16 32 18" preserveAspectRatio="xMidYMin meet" width="500" height="500">
  <defs>
    <style>
      .breathe {
        transform-origin: 7.5px 10px;
        animation: breathe 4.5s infinite ease-in-out;
      }
      .eye {
        transform-box: fill-box;
        transform-origin: center;
        animation: eye-blink 7s infinite;
      }
      .rod-group {
        transform-origin: 14px 8px;
        animation: rod-bob 4s infinite ease-in-out;
      }
      .bobber {
        animation: bobber-float 2s infinite ease-in-out;
      }
      .shadow-anim {
        transform-origin: 7.5px 15.5px;
        animation: shadow-pulse 4.5s infinite ease-in-out;
      }
      .fish {
        opacity: 0;
        animation: fish-peek 10s infinite ease-in-out;
      }
      .ripple1 {
        opacity: 0;
        animation: ripple 3s infinite ease-out;
      }
      .ripple2 {
        opacity: 0;
        animation: ripple 3s 1.5s infinite ease-out;
      }

      @keyframes breathe {
        0%, 100% { transform: scale(1, 1) translate(0, 0); }
        50% { transform: scale(1.02, 0.98) translate(0, 0.5px); }
      }
      @keyframes eye-blink {
        0%, 6%, 100% { transform: scaleY(1); }
        3% { transform: scaleY(0.1); }
      }
      @keyframes rod-bob {
        0%, 100% { transform: rotate(0deg); }
        25% { transform: rotate(-3deg); }
        75% { transform: rotate(2deg); }
      }
      @keyframes bobber-float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-0.5px); }
      }
      @keyframes shadow-pulse {
        0%, 100% { transform: scaleX(1); opacity: 0.4; }
        50% { transform: scaleX(0.98); opacity: 0.38; }
      }
      @keyframes fish-peek {
        0%, 38%, 62%, 100% { opacity: 0; transform: translate(0, 0); }
        42% { opacity: 0.9; transform: translate(-1px, 0); }
        50% { opacity: 0.9; transform: translate(1px, -0.5px); }
        58% { opacity: 0.9; transform: translate(2px, 0); }
      }
      @keyframes ripple {
        0% { opacity: 0.3; transform: scaleX(1); }
        100% { opacity: 0; transform: scaleX(2.5); }
      }
    </style>
  </defs>
  <g transform="scale(1,-1)">

  <!-- Shadow -->
  <rect class="shadow-anim" x="3" y="15" width="9" height="1" fill="#000"/>

  <!-- Legs -->
  <g fill="#DE886D">
    <rect x="3" y="12" width="1" height="3"/>
    <rect x="5" y="12" width="1" height="3"/>
    <rect x="9" y="12" width="1" height="3"/>
    <rect x="11" y="12" width="1" height="3"/>
  </g>

  <g class="breathe">
    <!-- Straw hat -->
    <rect x="1" y="4" width="13" height="1" fill="#F9A825"/>
    <rect x="2" y="4.5" width="11" height="0.5" fill="#8D6E63" opacity="0.4"/>
    <rect x="3" y="3" width="9" height="1" fill="#FBC02D"/>
    <rect x="4" y="2" width="7" height="1" fill="#FBC02D"/>

    <!-- Head stripe -->
    <rect x="2" y="5" width="11" height="1" fill="#C07050"/>
    <!-- Body -->
    <rect x="2" y="6" width="11" height="6" fill="#DE886D"/>
    <!-- Left arm resting -->
    <rect x="0" y="9" width="2" height="2" fill="#DE886D"/>
    <!-- Eyes (half-closed, relaxed) -->
    <rect class="eye" x="5" y="8" width="1" height="0.6" fill="#000"/>
    <rect class="eye" x="10" y="8" width="1" height="0.6" fill="#000"/>

    <!-- Right arm (raised to hold rod) -->
    <rect x="13" y="8" width="2" height="3" fill="#DE886D"/>

    <!-- Fishing rod assembly -->
    <g class="rod-group">
      <!-- Rod handle -->
      <rect x="14" y="6" width="1" height="3" fill="#8D6E63"/>
      <!-- Rod shaft -->
      <rect x="14.2" y="3" width="0.6" height="3" fill="#A1887F"/>
      <!-- Rod tip -->
      <rect x="14.3" y="1" width="0.4" height="2" fill="#795548"/>
      <!-- Reel -->
      <rect x="15" y="7" width="1" height="1" fill="#78909C"/>
      <!-- Fishing line -->
      <rect x="14.4" y="-5" width="0.2" height="6" fill="#B0BEC5" opacity="0.5"/>
      <!-- Bobber -->
      <g class="bobber">
        <rect x="14" y="-6" width="1" height="1" fill="#E53935"/>
        <rect x="14" y="-7" width="1" height="1" fill="#FFFFFF"/>
      </g>
    </g>
  </g>

  <!-- Ripples near bobber -->
  <rect class="ripple1" x="13" y="-8" width="3" height="0.4" fill="#64B5F6"/>
  <rect class="ripple2" x="12" y="-8" width="5" height="0.4" fill="#64B5F6"/>

  <!-- Pixel fish (appears briefly near bobber) -->
  <g class="fish">
    <rect x="17" y="-6" width="1" height="1" fill="#FF8A65"/>
    <rect x="16" y="-6" width="1" height="1" fill="#FF7043"/>
    <rect x="15" y="-6" width="1" height="1" fill="#FF7043"/>
    <rect x="18" y="-7" width="1" height="1" fill="#FF8A65"/>
    <rect x="18" y="-5" width="1" height="1" fill="#FF8A65"/>
    <rect x="15.3" y="-6.3" width="0.4" height="0.4" fill="#000"/>
  </g>

  </g>
</svg>
